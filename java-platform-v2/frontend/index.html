<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODECONNECT - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>CODECONNECT</h1>
        <nav>
            <ul>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#compiler">Compiler</a></li>
                <li><a href="#chat">Chat</a></li>
                <li><a href="#ai-assistant">AI Assistant</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="dashboard">
            <h2>Dashboard</h2>
            <p>Welcome to your coding dashboard!</p>
            <!-- Dashboard content goes here -->
        </section>
        <section id="compiler">
            <h2>Compiler</h2>
            <textarea id="code" placeholder="Write your code here..."></textarea>
            <button onclick="compileCode()">Compile</button>
            <div id="output"></div>
            <script>
                function compileCode() {
                    const code = document.getElementById('code').value;
                    document.getElementById('output').innerText = 'Compiling: ' + code;
                    // Actual compilation logic goes here
                }
            <\/script>
        </section>
        <section id="chat">
            <h2>Chat</h2>
            <div id="chat-window">
                <!-- Chat messages will appear here -->
            </div>
            <input type="text" id="chat-input" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
            <script>
                function sendMessage() {
                    const message = document.getElementById('chat-input').value;
                    const chatWindow = document.getElementById('chat-window');
                    chatWindow.innerHTML += '<p>' + message + '</p>';
                    document.getElementById('chat-input').value = '';
                }
            <\/script>
        </section>
        <section id="ai-assistant">
            <h2>AI Assistant</h2>
            <input type="text" id="ai-input" placeholder="Ask me anything...">
            <button onclick="askAI()">Ask</button>
            <div id="ai-response"></div>
            <script>
                function askAI() {
                    const question = document.getElementById('ai-input').value;
                    document.getElementById('ai-response').innerText = 'AI is thinking...';
                    // Simulate an AI response
                    setTimeout(() => {
                        document.getElementById('ai-response').innerText = 'Response to: ' + question;
                    }, 1000);
                }
            <\/script>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 CODECONNECT. All rights reserved.</p>
    </footer>
</body>
</html>
